#
# Automated release: on every push to main, if mailferry.__version__ has no
# matching GitHub Release yet, run the test suite and the release gates,
# build the artefacts, then create tag v<version> and publish the Release
# with mailferry.pyz, the versioned .pyz, the source archive, the wheel and
# SHA256SUMS attached. Releasing = bump __version__ + add the CHANGELOG
# section + push. Idempotent: pushes without a version bump do nothing.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Read single-source version
        id: v
        run: |
          echo "version=$(python3 -c 'import mailferry; print(mailferry.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already released
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.v.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.v.outputs.version }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run the test suite
        if: steps.gate.outputs.exists == 'false'
        run: python3 tests/test_e2e.py

      - name: Release gates + build artefacts
        if: steps.gate.outputs.exists == 'false'
        run: python3 tools/release.py

      - name: Extract release notes from CHANGELOG
        if: steps.gate.outputs.exists == 'false'
        run: |
          python3 - <<'PY'
          import pathlib
          import re

          import mailferry

          v = mailferry.__version__
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(rf"## \[{re.escape(v)}\].*?\n(.*?)(?=\n## \[|\n\[|\Z)", text, re.S)
          notes = (m.group(1).strip() + "\n") if m else f"MailFerry v{v}\n"
          pathlib.Path("release_notes.md").write_text(notes, encoding="utf-8")
          print(notes)
          PY

      - name: Create tag and GitHub Release
        if: steps.gate.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="${{ steps.v.outputs.version }}"
          gh release create "v$v" \
            "dist/mailferry.pyz" \
            "dist/mailferry-$v.pyz" \
            "dist/mailferry-$v-src.tar.gz" \
            "dist/mailferry-$v-py3-none-any.whl" \
            "dist/SHA256SUMS" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "MailFerry v$v — IMAP Migration & Sync" \
            --notes-file release_notes.md
          echo "Published: https://github.com/$GITHUB_REPOSITORY/releases/tag/v$v"
